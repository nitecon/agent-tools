app: agent-tools
title: Agent Tools gateway API context
summary: Agent-first context for gateway-backed agent-tools workflows, including Documentation, app-scoped hooks, and global patterns.
kind: agent_context
source_format: agent_context
source_ref: .agent/api/agent-tools.yaml
labels:
  - agent-tools
  - gateway
  - documentation
  - hooks
  - patterns
content:
  purpose: >
    Agent Tools exposes gateway-backed command surfaces for project
    Documentation context, app-scoped hook setup, global implementation
    patterns, task tracking, and comms. Agents should use this context before
    changing the matching CLI or gateway client contracts.
  workflows:
    - name: Discover Documentation placement
      steps:
        - Run agent-tools docs hierarchy --scope all before publishing or reorganizing docs.
        - Use --app APP or --space SPACE when the destination app or wiki space is known.
        - Use breadcrumbs, page/section ids, and placement hints from the hierarchy response to choose where new docs belong.
        - Render scope, global_rank, owner_project, wiki_path, artifact_id, and artifact_version_id when the gateway returns them.
        - Keep source/provenance ids for debugging, but use Documentation terminology in agent-facing output.
    - name: Search shared Documentation
      steps:
        - Run agent-tools docs search "<query>" --scope global to find globally visible shared docs.
        - Treat global_rank as gateway-provided priority metadata configured in the gateway UI as Global 1, Global 2, and so on.
        - Do not infer priority from SRE, security, platform, or owner_project naming conventions.
        - Expect results to render scope, global_rank, owner_project, wiki_path, artifact_id, and artifact_version_id when present.
    - name: Fetch local plus global chunks
      steps:
        - Run agent-tools docs chunks --query "<query>" --scope all for RAG context that combines project-local and global docs.
        - Preserve gateway result ordering; the CLI should not hardcode owner/project precedence for global docs.
        - Inspect scope, global_rank, owner_project, wiki_path, and provenance ids on each chunk before deciding what context applies.
    - name: Publish Documentation context
      steps:
        - Author a docs-first file such as .agent/api/<app>.yaml with app, title, content, and optional space/category/parent_page/parent_id/slug/order/sort_order placement metadata.
        - Use global_rank and global_descendants only when the user intends the page or subtree to be globally visible.
        - Validate locally with agent-tools docs validate --file PATH.
        - Publish with agent-tools docs publish --file PATH.
        - Search with agent-tools docs search and retrieve RAG chunks with agent-tools docs chunks; results may include breadcrumbs, page/section targets, scope, global_rank, owner_project, and wiki_path.
    - name: Sync app-scoped hooks
      steps:
        - Run agent-tools setup hooks after gateway setup to pull hooks for detected clients.
        - Use agent-tools setup hooks --app codex, --app claude, or --app gemini for one namespace.
        - Treat hooks as app-scoped; never install hook records returned for a different app namespace.
        - Hook names must be safe relative paths under the client hook directory; setup verifies size/checksum metadata when present.
    - name: Publish global patterns
      steps:
        - Validate a pattern file or markdown catalog with agent-tools patterns validate --file PATH.
        - Preview extracted payloads with agent-tools patterns preview --file PATH.
        - Publish or update by slug with agent-tools patterns publish --file PATH.
        - Use --category to classify patterns, for example programming-language/golang.
    - name: Search pattern guidance
      steps:
        - Run agent-tools patterns search QUERY --version latest --state active.
        - Add --category or --label when the desired guidance family is known.
        - Fetch full bodies with agent-tools patterns get ID_OR_SLUG before editing or applying a pattern.
  endpoints:
    - method: GET
      path: /v1/projects/:ident/api-docs/hierarchy
      purpose: Return a wiki-style Documentation tree with spaces, pages, sections, breadcrumbs, placement hints, version ids, labels, and provenance pointers.
      query:
        - q
        - app
        - space
        - scope
      response_fields:
        - scope
        - global_rank
        - owner_project
        - wiki_path
        - artifact_id
        - artifact_version_id
    - method: GET
      path: /v1/projects/:ident/api-docs/chunks
      purpose: Return ranked Documentation chunks with breadcrumbs and page/section targets when available.
      query:
        - q
        - app
        - label
        - kind
        - scope
      response_fields:
        - scope
        - global_rank
        - owner_project
        - wiki_path
        - artifact_id
        - artifact_version_id
    - method: GET
      path: /v1/projects/:ident/api-docs
      purpose: List or search Documentation entries with optional local/global/all visibility scope.
      query:
        - q
        - app
        - label
        - kind
        - scope
      response_fields:
        - scope
        - global_rank
        - owner_project
        - wiki_path
        - artifact_id
        - artifact_version_id
    - method: POST
      path: /v1/projects/:ident/api-docs
      purpose: Publish a docs-first Documentation entry with optional wiki placement metadata.
      request:
        required:
          - app
          - title
          - content
        optional:
          - space
          - category
          - parent_page
          - parent_id
          - slug
          - order
          - sort_order
          - global_rank
          - global_descendants
          - summary
          - labels
          - source_ref
          - version
    - method: GET
      path: /v1/hooks
      purpose: List app-scoped hook records for setup sync.
      query:
        - app
      response_fields:
        - app
        - name
        - content
        - size
        - checksum
        - updated_at
    - method: GET
      path: /v1/patterns
      purpose: List or search global patterns.
      query:
        - q
        - label
        - category
        - version
        - state
        - superseded_by
    - method: GET
      path: /v1/patterns/:id
      purpose: Fetch one pattern by id or slug.
    - method: POST
      path: /v1/patterns
      purpose: Create a global pattern.
    - method: PATCH
      path: /v1/patterns/:id
      purpose: Update pattern metadata or body.
    - method: DELETE
      path: /v1/patterns/:id
      purpose: Delete a pattern.
    - method: GET
      path: /v1/patterns/:id/comments
      purpose: List comments for a pattern.
    - method: POST
      path: /v1/patterns/:id/comments
      purpose: Add an agent comment to a pattern.
  auth:
    scheme: gateway_api_key
    header: Authorization
    agent_id_header: X-Agent-ID
  safety:
    - Keep CLI output concise and agent-facing; do not add JSON output flags for agent workflows.
    - Use Documentation as the primary agent-facing term. Reserve artifact ids for provenance/debug output and low-level artifact commands.
    - Treat scope, global_rank, owner_project, wiki_path, artifact_id, and artifact_version_id as gateway-provided metadata; preserve gateway ordering for global docs.
    - Always request hooks with an explicit app namespace such as codex, claude, or gemini; hooks are not portable across clients.
    - Reject unsafe hook names before writing; names must be relative paths without parent-directory traversal.
    - Fetch pattern body and comments before editing an existing gateway pattern.
    - Treat categories as routing metadata and labels as looser search tags.
    - Preserve slug stability for published pattern catalogs so repeat publishes update existing records.
  schemas:
    pattern:
      fields:
        - id
        - title
        - slug
        - summary
        - body
        - labels
        - categories
        - version
        - state
        - author
        - created_at
        - updated_at
    documentation_hierarchy_node:
      fields:
        - id
        - kind
        - title
        - slug
        - path
        - app
        - space
        - category
        - parent_page
        - parent_id
        - order
        - sort_order
        - scope
        - global_rank
        - global_descendants
        - owner_project
        - wiki_path
        - labels
        - current_version_id
        - accepted_version_id
        - breadcrumbs
        - sections
        - children
        - source_ref
        - source_artifact_id
        - source_artifact_version_id
        - artifact_id
        - artifact_version_id
    hook_record:
      fields:
        - app
        - name
        - content
        - size
        - checksum
        - updated_at
    create_pattern_request:
      required:
        - title
        - body
        - version
        - state
        - author
      optional:
        - slug
        - summary
        - labels
        - categories
  examples:
    - name: Publish DevelopWithGo catalog
      command: agent-tools patterns publish --file DevelopWithGo.md
    - name: Search Go patterns by category
      command: agent-tools patterns search router --category programming-language/golang --version latest --state active
    - name: Browse local plus global Documentation hierarchy
      command: agent-tools docs hierarchy --scope all
    - name: Search globally visible Documentation
      command: agent-tools docs search "publishing api context" --scope global
    - name: Fetch local plus global Documentation chunks
      command: agent-tools docs chunks --query "artifact provenance" --scope all
