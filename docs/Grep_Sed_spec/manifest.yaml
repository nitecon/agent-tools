          - "A shared contract document exists and covers command-state defaults for no path, explicit paths, directories, explicit stdin markers, sed preview, and sed write."
          - "The contract names the default traversal profile and records any intentional difference from current tree/search/symbol traversal behavior."
          - "The contract defines regex default mode, fixed-string mode, replacement grammar, text model, encoding model, binary handling, output record families, warning labels, truncation/resume hints, mutation behavior, and exit-code classes."
          - "The contract includes argv payload cases for leading dashes, delimiter-like text, dollars, backslashes, empty replacements, and newlines."
          - "The contract defines exact grep and sed exit-code semantics for success with records, success with no records, invalid input, warnings/skips, and partial traversal failures."
        touch_surface:
          - docs/grep-sed-contract.md
        gateway_task_id: 019e1db0-6ca3-7d11-b4fb-8418e13c6fa9
        status: done
        notes: |
          This is the gating task. Implementation tasks depend on it so the command surface stays deterministic across platforms and shells.
      - id: T002
        team: qa
        title: "Create conformance matrix and fixture plan"
        depends_on: [T001]
        spec_file: qa/T002-conformance-matrix.md
        acceptance_criteria:
          - "A conformance matrix lists representative grep and sed rows across command mode, input source, traversal profile, text model, dialect, output family, warning labels, mutation behavior, and exit-code class."
          - "Each automated row includes command argv, fixture inputs, exact process status, stdout/stderr record shape or golden output, warning labels, and whether comparison is byte-exact or normalized."
          - "Fixtures cover Linux, macOS, and Windows path handling concerns including CRLF, BOM, invalid UTF-8, binary prefiltering, hidden files, ignored files, symlinks or reparse points, and deterministic path ordering."
          - "The matrix includes quote-resistant argv payload examples for patterns and replacements that begin with dashes or contain delimiter-like text, dollars, backslashes, empty replacements, and newlines."
          - "The matrix maps every row to either an automated test target or a documented manual/platform validation target and names the platform validation artifact or CI target that will close manual rows."
